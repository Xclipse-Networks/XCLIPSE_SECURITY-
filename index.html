<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>XCLIPSE_OS // TERMINAL_v5.1</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style id="dynamic-bios">
        :root {
            --bg: #020408;
            --accent: #00f2ff;
            --accent-dim: rgba(0, 242, 255, 0.1);
            --border: rgba(0, 242, 255, 0.2);
            --danger: #ff003c;
            --warning: #ffb400;
            --surface: #0a0c10;
            --font-main: 'JetBrains Mono', 'Fira Code', monospace;
        }
    </style>

    <style>
        /* --- CORE STYLES (TRUNCATED FOR BREVITY, RETAINED FROM PREVIOUS) --- */
        * { box-sizing: border-box; cursor: crosshair !important; }
        body, html { background: var(--bg); color: #7a8a99; font-family: var(--font-main); margin: 0; height: 100vh; overflow: hidden; font-size: 11px; }
        
        #auth-gate { position: fixed; inset: 0; z-index: 10000; background: #000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .auth-container { width: 360px; padding: 30px; border: 1px solid var(--border); background: var(--surface); box-shadow: 0 0 40px rgba(0,0,0,1); }
        
        .t-input { width: 100%; background: #000; border: 1px solid var(--border); color: var(--accent); padding: 10px; margin-bottom: 12px; outline: none; font-family: var(--font-main); }
        .t-btn { width: 100%; padding: 10px; border: 1px solid var(--accent); background: var(--accent-dim); color: var(--accent); font-weight: 900; cursor: pointer; }
        .t-btn:hover { background: var(--accent); color: #000; }

        /* Persistence Toggle UI */
        .opt-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .chk-wrap { display: flex; align-items: center; gap: 8px; font-size: 8px; color: #444; cursor: pointer; }
        .chk-wrap input { display: none; }
        .chk-custom { width: 10px; height: 10px; border: 1px solid var(--border); position: relative; }
        input:checked + .chk-custom { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

        .master-layout { display: none; height: 100vh; grid-template-columns: 220px 1fr 280px; grid-template-rows: 50px 1fr 30px; gap: 1px; background: var(--border); }
        .authenticated .master-layout { display: grid; }
        .authenticated #auth-gate { display: none; }

        .panel { background: var(--bg); position: relative; overflow: hidden; }
        header { grid-column: 1 / -1; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; }
        .view-section { display: none; flex: 1; flex-direction: column; background: var(--bg); height: 100%; }
        .view-section.active { display: flex; }
        .terminal-wrap { flex: 1; padding: 15px; overflow-y: auto; background: #000; }
        .log-entry { margin-bottom: 4px; border-left: 2px solid var(--accent); padding-left: 10px; font-size: 9px; }
    </style>
</head>
<body onload="X_OS.init()">

<div id="auth-gate">
    <div class="auth-container">
        <div style="font-size: 8px; color: var(--accent); letter-spacing: 3px; margin-bottom: 20px; text-align: center; font-weight: 900;">SECURE_UPLINK_v5.1</div>
        
        <input type="email" id="op-email" class="t-input" placeholder="OPERATOR_EMAIL">
        <input type="password" id="op-pass" class="t-input" placeholder="ENCRYPTION_KEY">
        
        <div class="opt-row">
            <label class="chk-wrap">
                <input type="checkbox" id="remember-me" checked>
                <div class="chk-custom"></div> REMEMBER_SESSION
            </label>
            <span onclick="X_OS.forgotPass()" style="font-size:7px; color:#333; cursor:pointer;">[RECOVER_KEY]</span>
        </div>

        <button onclick="X_OS.handleAuth()" class="t-btn">INITIALIZE_HANDSHAKE</button>
        <div id="auth-status" style="margin-top:15px; text-align:center; font-size:8px; color:var(--danger);">SYSTEM_IDLE</div>
    </div>
</div>

<div class="master-layout">
    <header class="panel">
        <div style="font-weight: 900; letter-spacing: 4px;">XCLIPSE // <span id="op-id" style="color:var(--accent)">...</span></div>
        <button onclick="X_OS.terminate()" style="background:transparent; border:1px solid var(--danger); color:var(--danger); font-size:8px; padding:4px 10px;">TERMINATE</button>
    </header>

    <aside class="sidebar panel" style="padding:15px; display:flex; flex-direction:column; gap:5px;">
        <div class="nav-item active" onclick="X_OS.switchView('core-dash', this)">[01] CORE_DASH</div>
        <div class="nav-item" onclick="X_OS.switchView('shield-logs', this)">[02] SHIELD_LOGS</div>
        <div class="nav-item" onclick="X_OS.switchView('live-traffic', this)">[03] LIVE_TRAFFIC</div>
    </aside>

    <main class="viewport" style="background:var(--border); display:flex; flex-direction:column; gap:1px;">
        <section id="core-dash" class="view-section active">
            <div class="terminal-wrap" id="kernel-feed"></div>
        </section>
        <section id="shield-logs" class="view-section">
            <div class="terminal-wrap" id="shield-data"></div>
        </section>
        <section id="live-traffic" class="view-section">
            <div class="terminal-wrap" id="traffic-stream"></div>
        </section>
    </main>

    <aside class="panel" style="padding:15px; border-left:1px solid var(--border);">
        <div style="font-size:7px; color:var(--accent); font-weight:900; letter-spacing:2px; margin-bottom:15px;">PACKET_INSPECTOR</div>
        <div id="packet-logs" style="font-size:7px; opacity:0.4;"></div>
    </aside>
</div>

<script>
const X_OS = (() => {
    const config = {
        apiKey: "AIzaSyCdv6yESBrKhlEvU2URCXoVRVO-2OjAEv4",
        authDomain: "xclipse-security.firebaseapp.com",
        databaseURL: "https://xclipse-security-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "xclipse-security",
        storageBucket: "xclipse-security.firebasestorage.app",
        messagingSenderId: "161353959200",
        appId: "1:161353959200:web:d0b36f7817b31842cff945"
    };

    let auth, db;

    return {
        init: () => {
            firebase.initializeApp(config);
            auth = firebase.auth();
            db = firebase.database();
            X_OS.observeAuth();
        },

        handleAuth: async () => {
            const email = document.getElementById('op-email').value;
            const pass = document.getElementById('op-pass').value;
            const remember = document.getElementById('remember-me').checked;
            const status = document.getElementById('auth-status');

            try {
                // Apply persistence logic
                const persistence = remember ? 
                    firebase.auth.Auth.Persistence.LOCAL : 
                    firebase.auth.Auth.Persistence.SESSION;
                
                await auth.setPersistence(persistence);
                await auth.signInWithEmailAndPassword(email, pass);
            } catch (e) {
                status.innerText = `ERR: ${e.message.toUpperCase()}`;
            }
        },

        observeAuth: () => {
            auth.onAuthStateChanged(user => {
                if (user) {
                    document.body.classList.add('authenticated');
                    document.getElementById('op-id').innerText = user.email.toUpperCase();
                    X_OS.launchModules();
                } else {
                    document.body.classList.remove('authenticated');
                }
            });
        },

        launchModules: () => {
            X_OS.log('kernel-feed', '>> ENCRYPTED_SESSION_ESTABLISHED', 'var(--accent)');
            
            // Database Live Hook
            db.ref('.info/connected').on('value', snap => {
                X_OS.log('traffic-stream', `RTDB_STATE: ${snap.val() ? 'SYNCHRONIZED' : 'DISCONNECTED'}`);
            });

            // Simulated Traffic
            setInterval(() => {
                if(auth.currentUser) {
                    const packet = Math.random().toString(36).substring(7).toUpperCase();
                    X_OS.log('packet-logs', `HEX_${packet}.. [VALID]`, '#444');
                }
            }, 4000);
        },

        switchView: (id, el) => {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        },

        log: (id, msg, color = '#7a8a99') => {
            const container = document.getElementById(id);
            if(!container) return;
            const d = document.createElement('div');
            d.className = 'log-entry';
            d.innerHTML = `<span style="opacity:0.2;">[${new Date().toLocaleTimeString()}]</span> <span style="color:${color}">${msg}</span>`;
            container.prepend(d);
        },

        forgotPass: () => {
            const email = document.getElementById('op-email').value;
            if(!email) return alert("EMAIL_REQUIRED");
            auth.sendPasswordResetEmail(email).then(() => alert("RECOVERY_SIGNAL_SENT"));
        },

        terminate: () => auth.signOut().then(() => location.reload())
    };
})();
</script>
</body>
</html>
