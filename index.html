<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XCLIPSE // BLACKGATE_v10.4</title>

    <style>
        /* --- [CSS_CORE_STYLING] --- */
        :root {
            --bg-ultra: #010203;
            --panel-hex: rgba(7, 9, 15, 0.98);
            --accent-neon: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.4);
            --pink-neon: #ff007a;
            --danger-neon: #ff1100;
            --success-neon: #00ff88;
            --text-primary: #ffffff;
            --text-secondary: #4a5a6a;
            --border-thin: rgba(0, 242, 255, 0.15);
            --font-main: 'Inter', sans-serif;
            --font-code: 'JetBrains Mono', monospace;
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;400;900&family=JetBrains+Mono:wght@100;400;800&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: crosshair; }
        body, html { background: var(--bg-ultra); color: var(--text-primary); font-family: var(--font-main); height: 100vh; overflow: hidden; }

        /* HUD DECOR */
        .hud-overlay { position: fixed; inset: 0; pointer-events: none; z-index: 10001; border: 20px solid transparent; border-image: radial-gradient(circle, var(--border-thin) 1px, transparent 1px) 20; opacity: 0.3; }

        /* AUTH SCREEN */
        #auth-gate { position: fixed; inset: 0; z-index: 10000; background: #000; display: flex; align-items: center; justify-content: center; transition: 0.5s; }
        .gate-card { width: 400px; padding: 40px; background: var(--panel-hex); border: 1px solid var(--border-thin); text-align: center; box-shadow: 0 0 40px #000; }
        .gate-card h1 { font-size: 18px; letter-spacing: 10px; margin-bottom: 20px; color: var(--accent-neon); }

        /* UI COMPONENTS */
        .input-node { width: 100%; background: #000; border: 1px solid var(--border-thin); color: var(--accent-neon); padding: 12px; margin-bottom: 10px; font-family: var(--font-code); font-size: 11px; }
        .btn-core { width: 100%; padding: 12px; background: var(--accent-neon); color: #000; border: none; font-family: var(--font-code); font-weight: 800; font-size: 10px; cursor: pointer; letter-spacing: 2px; }
        .btn-core:disabled { opacity: 0.5; cursor: not-allowed; }
        
        #auth-log { font-family: var(--font-code); font-size: 9px; margin-top: 20px; line-height: 1.5; height: 30px; }
        .error-text { color: var(--danger-neon); }
        .loading-text { color: var(--accent-neon); animation: pulse 1s infinite; }

        /* MAINFRAME GRID */
        .mainframe-container { display: none; height: 100vh; padding: 20px; grid-template-columns: 320px 1fr 320px; gap: 20px; }
        body.authenticated .mainframe-container { display: grid; }
        body.authenticated #auth-gate { opacity: 0; pointer-events: none; }

        .hud-panel { background: var(--panel-hex); border: 1px solid var(--border-thin); display: flex; flex-direction: column; position: relative; }
        .panel-header { padding: 10px 15px; border-bottom: 1px solid var(--border-thin); font-family: var(--font-code); font-size: 9px; color: var(--text-secondary); }
        
        .time-display { font-size: 100px; font-weight: 100; text-align: center; margin-top: 100px; }
        .feed-container { flex-grow: 1; overflow-y: auto; padding: 15px; font-family: var(--font-code); font-size: 9px; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .hidden-node { display: none !important; }
    </style>
</head>
<body>

    <div class="hud-overlay"></div>

    <section id="auth-gate">
        <div class="gate-card">
            <h1>BLACKGATE_OS</h1>
            <input type="email" id="login-email" class="input-node" placeholder="USER_IDENT">
            <input type="password" id="login-pass" class="input-node" placeholder="PASS_KEY">
            <button id="auth-trigger" class="btn-core">ESTABLISH_UPLINK</button>
            <div id="auth-log">SYSTEM_READY</div>
        </div>
    </section>

    <div class="mainframe-container">
        <aside class="hud-panel">
            <div class="panel-header">OPERATIONS</div>
            <div style="padding:15px"><button onclick="BLACKGATE.exit()" class="btn-core" style="background:var(--danger-neon); color:#fff">TERMINATE</button></div>
        </aside>

        <main class="hud-panel" style="background:transparent; border:none;">
            <div class="time-display" id="os-time">00:00:00</div>
            <div id="log-viewport" class="feed-container" style="background:rgba(0,0,0,0.8); margin-top:20px; border:1px solid var(--border-thin)"></div>
        </main>

        <aside class="hud-panel">
            <div class="panel-header">NETWORK_TRAFFIC</div>
            <div id="traffic-viewport" class="feed-container"></div>
        </aside>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCdv6yESBrKhlEvU2URCXoVRVO-2OjAEv4",
            authDomain: "xclipse-security.firebaseapp.com",
            databaseURL: "https://xclipse-security-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "xclipse-security",
            storageBucket: "xclipse-security.firebasestorage.app",
            messagingSenderId: "161353959200",
            appId: "1:161353959200:web:d0b36f7817b31842cff945"
        };

        // Initialize Firebase
        let app, auth, db;
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getDatabase(app);
        } catch (e) {
            console.error("Firebase Init Failed:", e);
        }

        const BLACKGATE = (() => {
            const boot = () => {
                _initClock();
                _initAuth();
            };

            const _initClock = () => {
                setInterval(() => {
                    const el = document.getElementById('os-time');
                    if(el) el.innerText = new Date().toLocaleTimeString('en-GB');
                }, 1000);
            };

            const _initAuth = () => {
                const btn = document.getElementById('auth-trigger');
                const log = document.getElementById('auth-log');

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        document.body.classList.add('authenticated');
                        _sync();
                        _log("KERNEL_BOOT: OK", "var(--success-neon)");
                    }
                });

                btn.onclick = async () => {
                    const email = document.getElementById('login-email').value;
                    const pass = document.getElementById('login-pass').value;

                    if(!email || !pass) {
                        log.innerHTML = "<span class='error-text'>ERROR: MISSING_CREDENTIALS</span>";
                        return;
                    }

                    log.innerHTML = "<span class='loading-text'>AUTHENTICATING...</span>";
                    btn.disabled = true;

                    // 10 Second Timeout Protection
                    const timeout = setTimeout(() => {
                        log.innerHTML = "<span class='error-text'>ERR: TIMEOUT (Check Console/Network)</span>";
                        btn.disabled = false;
                    }, 10000);

                    try {
                        await signInWithEmailAndPassword(auth, email, pass);
                        clearTimeout(timeout);
                    } catch (err) {
                        clearTimeout(timeout);
                        btn.disabled = false;
                        console.error("Login Error:", err.code);
                        log.innerHTML = `<span class='error-text'>DENIED: ${err.code.split('/')[1] || err.message}</span>`;
                    }
                };
            };

            const _sync = () => {
                onValue(ref(db, 'network/traffic'), (s) => {
                    const v = document.getElementById('traffic-viewport');
                    if(!v) return;
                    v.innerHTML = '';
                    const d = s.val();
                    if(d) Object.keys(d).forEach(id => {
                        const div = document.createElement('div');
                        div.style.marginBottom = "10px";
                        div.innerHTML = `<span style="color:var(--accent-neon)">${id}</span><br>${d[id].current_page}`;
                        v.prepend(div);
                    });
                });
            };

            const _log = (m, c) => {
                const v = document.getElementById('log-viewport');
                if(!v) return;
                const e = document.createElement('div');
                e.style.color = c || 'var(--text-secondary)';
                e.style.marginBottom = "5px";
                e.innerHTML = `> [${new Date().toLocaleTimeString()}] ${m}`;
                v.prepend(e);
            };

            return {
                boot,
                exit: () => signOut(auth).then(() => location.reload())
            };
        })();

        window.BLACKGATE = BLACKGATE;
        BLACKGATE.boot();
    </script>
</body>
</html>
