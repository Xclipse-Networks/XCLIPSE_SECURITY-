<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>XCLIPSE // SECURITY_v5.1</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style id="theme-variables">
        :root {
            --bg: #05070a;
            --panel: rgba(13, 17, 23, 0.8);
            --accent: #00f2ff;
            --pink: #ec4899;
            --danger: #ff003c;
            --success: #00ff88;
            --text-dim: #4e555e;
        }
    </style>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;400;900&family=JetBrains+Mono:wght@100;400;800&display=swap');

        * { box-sizing: border-box; transition: all 0.2s ease; }
        body, html {
            background-color: var(--bg);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            overflow: hidden;
        }

        /* --- AUTH SCREEN --- */
        #login-screen {
            position: fixed; inset: 0; z-index: 10000; background: var(--bg);
            display: flex; align-items: center; justify-content: center;
        }
        .auth-card { width: 320px; padding: 30px; border: 1px solid rgba(255,255,255,0.05); background: rgba(255,255,255,0.02); border-radius: 15px; }

        /* --- LAYOUT GRID --- */
        .c2-layout {
            display: none; height: 100vh; width: 100vw;
            grid-template-columns: 320px 1fr 320px;
            padding: 30px; gap: 25px;
        }
        body.authenticated .c2-layout { display: grid; }
        body.authenticated #login-screen { display: none; }

        /* --- HUD MODULES --- */
        .hud-module {
            background: var(--panel);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px; padding: 20px;
            position: relative; backdrop-filter: blur(15px);
            margin-bottom: 15px;
        }
        .hud-label {
            position: absolute; top: -10px; left: 20px;
            background: var(--bg); padding: 2px 10px;
            font-size: 8px; font-family: 'JetBrains Mono';
            color: var(--text-dim); letter-spacing: 2px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* --- CENTER ENGINE --- */
        .temporal-engine {
            background: var(--panel);
            border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.03);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            position: relative;
        }
        .clock-face { font-size: 130px; font-weight: 900; letter-spacing: -6px; line-height: 1; display: flex; align-items: baseline; }
        .ampm { font-size: 30px; color: var(--text-dim); margin-left: 15px; font-style: italic; }

        /* --- SETTINGS PANEL --- */
        #settings-overlay {
            position: absolute; inset: 0; background: var(--bg);
            z-index: 100; border-radius: 60px; display: none;
            padding: 50px; overflow-y: auto;
        }
        #settings-overlay.active { display: block; }

        /* --- ELEMENTS --- */
        #map-container { width: 100%; height: 140px; background: #000; border: 1px solid rgba(255,255,255,0.05); position: relative; overflow: hidden; }
        .map-ping { position: absolute; width: 4px; height: 4px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 10px var(--accent); animation: ping 2s infinite; }
        @keyframes ping { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(4); opacity: 0; } }

        .t-input { width: 100%; background: #000; border: 1px solid #1a1e23; color: var(--accent); padding: 10px; margin: 5px 0; font-family: 'JetBrains Mono'; font-size: 10px; outline: none; }
        .t-btn { width: 100%; padding: 10px; border: none; font-weight: 900; font-size: 9px; cursor: pointer; text-transform: uppercase; margin-top: 5px; }
        
        .log-scroll { height: 100px; overflow-y: auto; font-family: 'JetBrains Mono'; font-size: 8px; }
        .traffic-card { border-left: 2px solid var(--accent); padding: 5px; background: rgba(255,255,255,0.02); margin-bottom: 8px; font-size: 9px; }

        .theme-swatch { width: 25px; height: 25px; border-radius: 50%; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); }
    </style>
</head>
<body onload="startTime(); loadSavedTheme();">

<div id="login-screen">
    <div class="auth-card">
        <div style="font-size: 10px; color: var(--pink); letter-spacing: 4px; font-weight: 900; margin-bottom: 5px;">XCLIPSE STUDIO</div>
        <div style="font-size: 20px; font-weight: 300; margin-bottom: 30px;">C2_LOGIN</div>
        <input type="email" id="fb-email" class="t-input" placeholder="OPERATOR_EMAIL">
        <input type="password" id="fb-pass" class="t-input" placeholder="ACCESS_KEY">
        <button onclick="authenticate()" class="t-btn" style="background: var(--accent); color: #000;">ESTABLISH_UPLINK</button>
    </div>
</div>

<div class="c2-layout">
    <aside>
        <div class="hud-module">
            <span class="hud-label">CORE_NAVIGATION</span>
            <button onclick="toggleSettings(true)" class="t-btn" style="background: rgba(255,255,255,0.05); color: #fff;">[ OPEN_SETTINGS ]</button>
            <button onclick="signOut()" class="t-btn" style="background: transparent; border: 1px solid var(--danger); color: var(--danger); margin-top: 10px;">TERMINATE_SESSION</button>
        </div>

        <div class="hud-module">
            <span class="hud-label">SHIELD_PROTOCOL</span>
            <button id="lockdown-btn" onclick="toggleLockdown()" class="t-btn" style="background: var(--danger); color:#fff">INITIALIZE_LOCK</button>
            <div id="ip-display" style="font-size: 8px; color: var(--text-dim); margin-top: 10px; font-family: 'JetBrains Mono';">NODE: 0.0.0.0</div>
        </div>

        <div class="hud-module">
            <span class="hud-label">GEOSPATIAL_MAP</span>
            <div id="map-container"></div>
        </div>
    </aside>

    <main class="temporal-engine">
        <div id="settings-overlay">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h2 style="letter-spacing: 5px; font-weight: 100;">SYSTEM_CONFIGURATION</h2>
                <button onclick="toggleSettings(false)" class="t-btn" style="width: 80px; background: var(--accent); color:#000;">CLOSE</button>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
                <div class="hud-module">
                    <span class="hud-label">THEME_ENGINE</span>
                    <div style="display: flex; gap: 15px; margin-top: 10px;">
                        <div class="theme-swatch" style="background: #00f2ff;" onclick="setTheme('stratos')"></div>
                        <div class="theme-swatch" style="background: #ffb400;" onclick="setTheme('amber')"></div>
                        <div class="theme-swatch" style="background: #ec4899;" onclick="setTheme('neon')"></div>
                    </div>
                </div>
                <div class="hud-module">
                    <span class="hud-label">CREDENTIAL_SYNC</span>
                    <input type="email" id="new-email" class="t-input" placeholder="NEW_EMAIL">
                    <button onclick="updateEmail()" class="t-btn" style="background: var(--accent); color:#000;">UPDATE_MAIL</button>
                    <input type="password" id="new-pass" class="t-input" placeholder="NEW_PASSWORD" style="margin-top:15px;">
                    <button onclick="updatePassword()" class="t-btn" style="background: var(--pink); color:#fff;">UPDATE_PASS</button>
                </div>
            </div>
        </div>

        <div class="clock-face">
            <span id="hms">00:00:00</span>
            <span class="ampm" id="ampm">PM</span>
        </div>

        <div class="hud-module" style="position: absolute; bottom: 8%; width: 85%; background: rgba(0,0,0,0.4);">
            <span class="hud-label">SYSTEM_TERMINAL</span>
            <div id="logs" class="log-scroll"></div>
        </div>
    </main>

    <aside>
        <div class="hud-module">
            <span class="hud-label">SIGNAL_PUSH</span>
            <input type="text" id="marquee-msg" class="t-input" placeholder="BROADCAST_MSG">
            <button onclick="updateMarquee()" class="t-btn" style="background: var(--pink); color: #fff;">PUSH_SIGNAL</button>
        </div>

        <div class="hud-module">
            <span class="hud-label">RESTRICTION</span>
            <input type="text" id="target-ip" class="t-input" placeholder="IP_ADDRESS">
            <button onclick="banIP()" class="t-btn" style="background: #fff; color: #000;">EXECUTE_BAN</button>
        </div>

        <div class="hud-module" style="flex-grow: 1;">
            <span class="hud-label">LIVE_TRAFFIC</span>
            <div id="traffic-stream" class="log-scroll" style="height: 200px;"></div>
        </div>
    </aside>
</div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyCdv6yESBrKhlEvU2URCXoVRVO-2OjAEv4",
        authDomain: "xclipse-security.firebaseapp.com",
        databaseURL: "https://xclipse-security-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "xclipse-security",
        storageBucket: "xclipse-security.firebasestorage.app",
        messagingSenderId: "161353959200",
        appId: "1:161353959200:web:d0b36f7817b31842cff945"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    // --- CLOCK ENGINE ---
    function startTime() {
        const now = new Date();
        let h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
        let ampm = h >= 12 ? 'PM' : 'AM';
        h = h % 12 || 12;
        m = m < 10 ? "0" + m : m; s = s < 10 ? "0" + s : s;
        document.getElementById('hms').innerText = `${h}:${m}:${s}`;
        document.getElementById('ampm').innerText = ampm;
        setTimeout(startTime, 1000);
    }

    // --- THEME ENGINE ---
    const themes = {
        stratos: { accent: '#00f2ff', bg: '#05070a' },
        amber: { accent: '#ffb400', bg: '#0a0805' },
        neon: { accent: '#ec4899', bg: '#0a0508' }
    };
    function setTheme(name) {
        const t = themes[name];
        document.getElementById('theme-variables').innerHTML = `:root { --bg: ${t.bg}; --panel: rgba(13, 17, 23, 0.8); --accent: ${t.accent}; --pink: #ec4899; --danger: #ff003c; --success: #00ff88; --text-dim: #4e555e; }`;
        localStorage.setItem('xclipse_theme', name);
    }
    function loadSavedTheme() {
        const saved = localStorage.getItem('xclipse_theme');
        if(saved) setTheme(saved);
    }

    // --- AUTH ---
    async function authenticate() {
        const e = document.getElementById('fb-email').value, p = document.getElementById('fb-pass').value;
        try { await auth.signInWithEmailAndPassword(e, p); } catch(err) { alert(err.message); }
    }
    auth.onAuthStateChanged(user => {
        if(user) { document.body.classList.add('authenticated'); initC2(); }
        else { document.body.classList.remove('authenticated'); }
    });
    function signOut() { auth.signOut().then(() => location.reload()); }

    // --- SETTINGS TOGGLE ---
    function toggleSettings(show) {
        document.getElementById('settings-overlay').style.display = show ? 'block' : 'none';
    }

    // --- CORE LOGIC (RESTORED FEATURES) ---
    function initC2() {
        // Shield
        db.ref('network/security_shield').on('value', s => {
            const active = s.val() === 'Active';
            const btn = document.getElementById('lockdown-btn');
            btn.innerText = active ? "SHIELD_ACTIVE" : "SHIELD_OFF";
            btn.style.background = active ? "#fff" : "var(--danger)";
            btn.style.color = active ? "var(--danger)" : "#fff";
        });

        // Traffic & Map
        db.ref('network/traffic').on('value', s => {
            const stream = document.getElementById('traffic-stream');
            const map = document.getElementById('map-container');
            stream.innerHTML = ''; map.innerHTML = '';
            const data = s.val();
            if(data) {
                Object.keys(data).forEach(id => {
                    stream.innerHTML += `<div class="traffic-card"><div style="color:var(--accent)">${id.replaceAll('-', '.')}</div><div style="opacity:0.4">${data[id].current_page}</div></div>`;
                    const ping = document.createElement('div');
                    ping.className = 'map-ping'; ping.style.left = Math.random() * 90 + '%'; ping.style.top = Math.random() * 80 + '%';
                    map.appendChild(ping);
                });
            }
        });
    }

    // --- SETTINGS ACTIONS ---
    async function updateEmail() {
        const mail = document.getElementById('new-email').value;
        try { await auth.currentUser.updateEmail(mail); alert("Email Updated"); } catch(e) { alert(e.message); }
    }
    async function updatePassword() {
        const pass = document.getElementById('new-pass').value;
        try { await auth.currentUser.updatePassword(pass); alert("Password Updated"); } catch(e) { alert(e.message); }
    }

    // --- HUD ACTIONS ---
    function toggleLockdown() {
        db.ref('network/security_shield').once('value', s => {
            db.ref('network/security_shield').set(s.val() === 'Active' ? 'Disabled' : 'Active');
        });
    }
    function updateMarquee() {
        const m = document.getElementById('marquee-msg').value;
        if(m) db.ref('network/global_marquee').set(m);
    }
    function banIP() {
        const ip = document.getElementById('target-ip').value;
        if(ip.includes('.')) db.ref('network/blacklist/' + ip.replaceAll('.', '-')).set({ ts: Date.now() });
    }

    fetch('https://api.ipify.org?format=json').then(r => r.json()).then(d => document.getElementById('ip-display').innerText = `NODE: ${d.ip}`);
</script>
</body>
</html>
