<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>XCLIPSE // SECURITY_v5.1</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

    <style id="theme-logic">
        :root {
            --bg: #010206;
            --accent: #00f2ff;
            --border: rgba(0, 242, 255, 0.15);
        }
    </style>

    <style>
        body, html {
            background: var(--bg) !important;
            color: #b5c2d1; font-family: 'JetBrains Mono', monospace;
            margin: 0; padding: 0; height: 100vh; overflow: hidden; font-size: 10px;
        }

        #auth-gate {
            position: fixed; inset: 0; z-index: 10000; background: #000;
            display: flex; align-items: center; justify-content: center;
        }

        .hud-box { border: 1px solid var(--border); background: rgba(0,0,0,0.9); padding: 20px; position: relative; width: 320px; }
        .hud-label { position: absolute; top: -6px; left: 8px; background: #000; padding: 0 5px; font-size: 7px; color: var(--accent); font-weight: 900; letter-spacing: 1.5px; }

        .t-input { 
            width: 100%; background: #050505; border: 1px solid var(--border); 
            color: var(--accent); font-size: 10px; padding: 12px; outline: none; 
            margin-bottom: 15px; box-sizing: border-box; font-family: 'JetBrains Mono';
        }

        .t-btn { 
            width: 100%; padding: 12px; border: none; font-weight: 900; font-size: 9px; 
            cursor: pointer; text-transform: uppercase; background: var(--accent); color: #000;
        }

        .c2-layout { display: none; height: 100vh; grid-template-columns: 200px 1fr; grid-template-rows: 40px 1fr; }
        .authenticated .c2-layout { display: grid; }
        .authenticated #auth-gate { display: none; }

        header { grid-column: 1 / -1; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 15px; justify-content: space-between; background: #000; }
        .viewport { padding: 20px; background: #000; border-left: 1px solid var(--border); }
        #status-msg { color: var(--accent); font-size: 8px; margin-top: 15px; text-align: center; font-weight: 800; min-height: 10px; }
    </style>
</head>
<body onload="checkSignInLink()">

<div id="auth-gate">
    <div class="hud-box">
        <span class="hud-label">PASSWORDLESS_UPLINK_PROTOCOL</span>
        
        <div id="request-sector">
            <input type="email" id="op-email" class="t-input" placeholder="OPERATOR_EMAIL_ADDRESS">
            <button onclick="sendMagicLink()" class="t-btn">REQUEST_ACCESS_TOKEN</button>
        </div>

        <div id="status-msg">READY_FOR_INPUT</div>
    </div>
</div>

<div class="c2-layout">
    <header>
        <div style="font-weight: 900; letter-spacing: 2px;">XCLIPSE // <span id="op-display" style="color:var(--accent)">VERIFIED</span></div>
        <button onclick="auth.signOut(); location.reload();" style="background:transparent; border:1px solid var(--border); color:var(--accent); font-size:8px; padding:4px 10px; cursor:pointer;">TERMINATE_SESSION</button>
    </header>
    
    <aside style="background: #000; padding: 15px;">
        <div style="color:var(--accent); font-size:9px;">[ACTIVE_SESSION]</div>
    </aside>

    <main class="viewport">
        <div class="hud-box" style="width: 100%; height: 80%;">
            <span class="hud-label">ENCRYPTED_DATA_STREAM</span>
            <div id="logs" style="font-size:9px; line-height:1.6;"></div>
        </div>
    </main>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCdv6yESBrKhlEvU2URCXoVRVO-2OjAEv4",
        authDomain: "xclipse-security.firebaseapp.com",
        projectId: "xclipse-security",
        storageBucket: "xclipse-security.firebasestorage.app",
        messagingSenderId: "161353959200",
        appId: "1:161353959200:web:d0b36f7817b31842cff945"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // 1. SEND MAGIC LINK
    async function sendMagicLink() {
        const email = document.getElementById('op-email').value;
        const msg = document.getElementById('status-msg');

        const actionCodeSettings = {
            url: window.location.href, // Redirects back to this page
            handleCodeInApp: true
        };

        try {
            await auth.sendSignInLinkToEmail(email, actionCodeSettings);
            window.localStorage.setItem('emailForSignIn', email);
            msg.innerText = "ACCESS_LINK_DISPATCHED. CHECK_INBOX.";
        } catch (error) {
            msg.style.color = "#ff003c";
            msg.innerText = `UPLINK_ERR: ${error.message.toUpperCase()}`;
        }
    }

    // 2. CHECK FOR INCOMING LINK (Runs on Load)
    async function checkSignInLink() {
        if (auth.isSignInWithEmailLink(window.location.href)) {
            let email = window.localStorage.getItem('emailForSignIn');
            
            // If user opened link on a different device/browser, ask for email again
            if (!email) {
                email = window.prompt('PLEASE_CONFIRM_OPERATOR_EMAIL_FOR_HANDSHAKE:');
            }

            try {
                await auth.signInWithEmailLink(email, window.location.href);
                window.localStorage.removeItem('emailForSignIn');
                // URL cleanup
                window.history.replaceState({}, document.title, window.location.pathname);
            } catch (error) {
                alert(`HANDSHAKE_FAILED: ${error.message}`);
            }
        }
    }

    // 3. AUTH OBSERVER
    auth.onAuthStateChanged(user => {
        if (user) {
            document.body.classList.add('authenticated');
            document.getElementById('op-display').innerText = user.email.toUpperCase();
            addLog(`>> UPLINK_SUCCESS: ${user.email}`, 'var(--accent)');
        } else {
            document.body.classList.remove('authenticated');
        }
    });

    function addLog(msg, color) {
        const logs = document.getElementById('logs');
        const d = document.createElement('div');
        d.innerHTML = `<span style="opacity:0.3;">[${new Date().toLocaleTimeString()}]</span> <span style="color:${color}">${msg}</span>`;
        logs.prepend(d);
    }
</script>
</body>
</html>
